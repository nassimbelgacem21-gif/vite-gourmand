<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nos Menus – Vite & Gourmand</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;color:#2d2d2d;background:#fffdf9}
a{text-decoration:none;color:inherit}

nav{background:#1a1a1a;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100}
.logo{color:#f5a623;font-size:1.4rem;font-weight:700}
.logo span{color:#fff}
.nav-links{display:flex;gap:2rem;align-items:center}
.nav-links a{color:#ccc;font-size:.9rem;transition:color .2s}
.nav-links a:hover{color:#f5a623}
.btn-login{background:#f5a623;color:#1a1a1a!important;padding:8px 18px;border-radius:6px;font-weight:600;font-size:.85rem!important}

.page-header{background:linear-gradient(135deg,#1a1a1a,#2d1a00);color:#fff;padding:60px 2rem;text-align:center}
.page-header h1{font-size:2.5rem;font-weight:800;margin-bottom:.5rem}
.page-header h1 span{color:#f5a623}
.page-header p{color:#ccc;font-size:1rem}

.main{max-width:1200px;margin:0 auto;padding:3rem 2rem;display:grid;grid-template-columns:280px 1fr;gap:2rem}

/* FILTRES */
.filters{background:#fff;border:1px solid #f0e8d8;border-radius:12px;padding:1.5rem;height:fit-content;position:sticky;top:80px}
.filters h3{font-size:1rem;font-weight:700;margin-bottom:1.5rem;padding-bottom:.75rem;border-bottom:1px solid #f0e8d8}
.filter-group{margin-bottom:1.5rem}
.filter-group label{display:block;font-size:.82rem;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:.75rem}
.filter-group input[type=range]{width:100%;accent-color:#f5a623}
.range-val{font-size:.85rem;color:#f5a623;font-weight:600;margin-top:.25rem}
.filter-group select{width:100%;padding:8px 10px;border:1px solid #e0d8cc;border-radius:6px;font-size:.9rem;background:#fffdf9;color:#2d2d2d}
.filter-group input[type=number]{width:100%;padding:8px 10px;border:1px solid #e0d8cc;border-radius:6px;font-size:.9rem;background:#fffdf9}
.price-range{display:flex;gap:.5rem;align-items:center;font-size:.85rem;color:#888}
.price-range input{width:80px}
.btn-reset{width:100%;padding:10px;background:transparent;border:1px solid #f0e8d8;border-radius:6px;font-size:.85rem;color:#888;cursor:pointer;transition:all .2s}
.btn-reset:hover{border-color:#f5a623;color:#f5a623}

/* MENUS GRID */
.menus-section h2{font-size:1.1rem;color:#888;margin-bottom:1.5rem}
.menus-section h2 span{color:#2d2d2d;font-weight:700}
.menus-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem}
.menu-card{background:#fff;border:1px solid #f0e8d8;border-radius:12px;overflow:hidden;transition:transform .2s,box-shadow .2s}
.menu-card:hover{transform:translateY(-4px);box-shadow:0 8px 30px rgba(245,166,35,.15)}
.menu-img{height:160px;display:flex;align-items:center;justify-content:center;font-size:3.5rem;background:linear-gradient(135deg,#f5a623,#e07510)}
.menu-body{padding:1.25rem}
.menu-badges{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.75rem}
.badge{font-size:.7rem;padding:3px 10px;border-radius:99px;font-weight:600}
.badge-theme{background:#fff3dc;color:#b07a00}
.badge-regime{background:#e8f5e9;color:#2e7d32}
.badge-stock{background:#fce4e4;color:#c62828}
.badge-stock.ok{background:#e8f5e9;color:#2e7d32}
.menu-title{font-size:1.05rem;font-weight:700;margin-bottom:.5rem}
.menu-desc{font-size:.85rem;color:#666;line-height:1.6;margin-bottom:1rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.menu-footer{display:flex;align-items:center;justify-content:space-between;padding-top:1rem;border-top:1px solid #f0e8d8}
.menu-info{font-size:.8rem;color:#888}
.menu-info strong{color:#2d2d2d;font-size:.95rem;display:block}
.btn-detail{background:#f5a623;color:#1a1a1a;padding:8px 16px;border-radius:6px;font-size:.82rem;font-weight:700;border:none;cursor:pointer;transition:background .2s}
.btn-detail:hover{background:#e09510}

.no-result{grid-column:1/-1;text-align:center;padding:3rem;color:#888}
.no-result .icon{font-size:3rem;margin-bottom:1rem}

footer{background:#1a1a1a;color:#ccc;padding:2rem;text-align:center;font-size:.85rem;margin-top:3rem}
footer a{color:#888;margin:0 .5rem}
footer a:hover{color:#f5a623}

@media(max-width:768px){
  .main{grid-template-columns:1fr}
  .filters{position:static}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Vite <span>& Gourmand</span></a>
  <div class="nav-links">
    <a href="menus.html">Nos menus</a>
    <a href="contact.html">Contact</a>
    <a href="login.html" class="btn-login">Connexion</a>
  </div>
</nav>

<div class="page-header">
  <h1>Nos <span>Menus</span></h1>
  <p>Découvrez notre sélection de menus pour tous vos événements</p>
</div>

<div class="main">
  <aside class="filters">
    <h3>🔍 Filtrer les menus</h3>
    <div class="filter-group">
      <label>Prix maximum</label>
      <input type="range" id="prix-max" min="50" max="500" value="500" oninput="filtrer()">
      <div class="range-val">Jusqu'à <span id="prix-max-val">500</span> €</div>
    </div>
    <div class="filter-group">
      <label>Fourchette de prix</label>
      <div class="price-range">
        <input type="number" id="prix-min" placeholder="Min" min="0" oninput="filtrer()">
        <span>–</span>
        <input type="number" id="prix-fin" placeholder="Max" min="0" oninput="filtrer()">
      </div>
    </div>
    <div class="filter-group">
      <label>Thème</label>
      <select id="filtre-theme" onchange="filtrer()">
        <option value="">Tous les thèmes</option>
        <option value="Noël">Noël</option>
        <option value="Pâques">Pâques</option>
        <option value="Classique">Classique</option>
        <option value="Événement">Événement</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Régime</label>
      <select id="filtre-regime" onchange="filtrer()">
        <option value="">Tous les régimes</option>
        <option value="Classique">Classique</option>
        <option value="Végétarien">Végétarien</option>
        <option value="Vegan">Vegan</option>
      </select>
    </div>
    <div class="filter-group">
      <label>Personnes minimum</label>
      <input type="number" id="filtre-personnes" placeholder="Ex: 10" min="1" oninput="filtrer()">
    </div>
    <button class="btn-reset" onclick="reinitialiser()">Réinitialiser les filtres</button>
  </aside>

  <div class="menus-section">
    <h2>Affichage : <span id="nb-resultats">6</span> menu(s)</h2>
    <div class="menus-grid" id="menus-grid"></div>
  </div>
</div>

<footer>
  <span>© 2024 Vite & Gourmand</span>
  <a href="mentions-legales.html">Mentions légales</a>
  <a href="cgv.html">CGV</a>
</footer>

<script>
const menus = [
  {id:1,titre:"Menu Noël Prestige",description:"Un repas de fête inoubliable avec foie gras, chapon rôti et bûche maison. Idéal pour réunir famille et amis autour d'une table festive.",theme:"Noël",regime:"Classique",prix:185,personnes:8,stock:5,emoji:"🎄"},
  {id:2,titre:"Menu Pâques Gourmand",description:"Agneau de lait, légumes printaniers et chocolats artisanaux pour célébrer Pâques avec élégance et fraîcheur.",theme:"Pâques",regime:"Classique",prix:120,personnes:6,stock:8,emoji:"🐣"},
  {id:3,titre:"Menu Mariage Classique",description:"Menu raffiné pour votre grand jour : velouté, filet de bœuf Wellington et pièce montée sur mesure. Service complet inclus.",theme:"Événement",regime:"Classique",prix:320,personnes:20,stock:3,emoji:"💍"},
  {id:4,titre:"Menu Végétarien Printemps",description:"Risotto aux asperges, tarte aux légumes du moment et tiramisu maison. Une cuisine végétarienne gastronomique et savoureuse.",theme:"Classique",regime:"Végétarien",prix:95,personnes:4,stock:10,emoji:"🥗"},
  {id:5,titre:"Menu Vegan Découverte",description:"Un parcours culinaire 100% végétal : soupe froide, burger vegan gourmet et dessert au chocolat noir. Zéro compromis sur le goût.",theme:"Classique",regime:"Vegan",prix:85,personnes:4,stock:12,emoji:"🌱"},
  {id:6,titre:"Menu Entreprise Premium",description:"Buffet froid et chaud pour vos événements d'entreprise. Plateaux repas personnalisés, livraison et installation incluses.",theme:"Événement",regime:"Classique",prix:65,personnes:10,stock:0,emoji:"🏢"},
];

function afficherMenus(liste){
  const grid = document.getElementById('menus-grid');
  document.getElementById('nb-resultats').textContent = liste.length;
  if(liste.length===0){
    grid.innerHTML='<div class="no-result"><div class="icon">🔍</div><p>Aucun menu ne correspond à vos critères.</p></div>';
    return;
  }
  grid.innerHTML = liste.map(m=>`
    <div class="menu-card">
      <div class="menu-img">${m.emoji}</div>
      <div class="menu-body">
        <div class="menu-badges">
          <span class="badge badge-theme">${m.theme}</span>
          <span class="badge badge-regime">${m.regime}</span>
          <span class="badge badge-stock ${m.stock>0?'ok':''}">${m.stock>0?m.stock+' restant(s)':'Complet'}</span>
        </div>
        <div class="menu-title">${m.titre}</div>
        <div class="menu-desc">${m.description}</div>
        <div class="menu-footer">
          <div class="menu-info">
            <strong>${m.prix} €</strong>
            pour ${m.personnes} pers. min.
          </div>
          <button class="btn-detail" onclick="window.location.href='detail-menu.html?id=${m.id}'">Voir le détail</button>
        </div>
      </div>
    </div>
  `).join('');
}

function filtrer(){
  const prixMax = parseInt(document.getElementById('prix-max').value);
  const prixMin = parseInt(document.getElementById('prix-min').value)||0;
  const prixFin = parseInt(document.getElementById('prix-fin').value)||99999;
  const theme = document.getElementById('filtre-theme').value;
  const regime = document.getElementById('filtre-regime').value;
  const personnes = parseInt(document.getElementById('filtre-personnes').value)||0;
  document.getElementById('prix-max-val').textContent = prixMax;
  const resultat = menus.filter(m=>
    m.prix<=prixMax &&
    m.prix>=prixMin &&
    m.prix<=prixFin &&
    (theme===''||m.theme===theme) &&
    (regime===''||m.regime===regime) &&
    m.personnes>=personnes
  );
  afficherMenus(resultat);
}

function reinitialiser(){
  document.getElementById('prix-max').value=500;
  document.getElementById('prix-max-val').textContent=500;
  document.getElementById('prix-min').value='';
  document.getElementById('prix-fin').value='';
  document.getElementById('filtre-theme').value='';
  document.getElementById('filtre-regime').value='';
  document.getElementById('filtre-personnes').value='';
  afficherMenus(menus);
}

afficherMenus(menus);
</script>
</body>
</html>
