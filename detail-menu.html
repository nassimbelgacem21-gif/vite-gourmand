<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Détail Menu – Vite & Gourmand</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;color:#2d2d2d;background:#fffdf9}
a{text-decoration:none;color:inherit}

nav{background:#1a1a1a;padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100}
.logo{color:#f5a623;font-size:1.4rem;font-weight:700}
.logo span{color:#fff}
.nav-links{display:flex;gap:2rem;align-items:center}
.nav-links a{color:#ccc;font-size:.9rem;transition:color .2s}
.nav-links a:hover{color:#f5a623}
.btn-login{background:#f5a623;color:#1a1a1a!important;padding:8px 18px;border-radius:6px;font-weight:600;font-size:.85rem!important}

.container{max-width:1100px;margin:0 auto;padding:3rem 2rem}
.back{display:inline-flex;align-items:center;gap:.5rem;color:#888;font-size:.9rem;margin-bottom:2rem;transition:color .2s}
.back:hover{color:#f5a623}

.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem;margin-bottom:3rem}
.detail-img{background:linear-gradient(135deg,#f5a623,#e07510);border-radius:16px;height:350px;display:flex;align-items:center;justify-content:center;font-size:6rem}
.detail-info h1{font-size:2rem;font-weight:800;margin-bottom:1rem;line-height:1.3}
.badges{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1.5rem}
.badge{font-size:.75rem;padding:4px 12px;border-radius:99px;font-weight:600}
.badge-theme{background:#fff3dc;color:#b07a00}
.badge-regime{background:#e8f5e9;color:#2e7d32}
.badge-stock{background:#e8f5e9;color:#2e7d32}
.badge-stock.complet{background:#fce4e4;color:#c62828}
.desc{color:#555;line-height:1.8;margin-bottom:1.5rem;font-size:.95rem}

.price-box{background:#fff;border:2px solid #f5a623;border-radius:12px;padding:1.5rem;margin-bottom:1.5rem}
.price-box .price{font-size:2.5rem;font-weight:800;color:#f5a623}
.price-box .price-detail{font-size:.85rem;color:#888;margin-top:.25rem}
.price-box .reduction{font-size:.82rem;color:#2e7d32;background:#e8f5e9;padding:6px 12px;border-radius:6px;margin-top:.75rem;display:inline-block}

.conditions{background:#fff8e1;border-left:4px solid #f5a623;border-radius:0 8px 8px 0;padding:1.25rem;margin-bottom:1.5rem}
.conditions h4{font-size:.9rem;font-weight:700;color:#b07a00;margin-bottom:.5rem}
.conditions p{font-size:.85rem;color:#666;line-height:1.7}

.btn-commander{width:100%;padding:16px;background:#f5a623;color:#1a1a1a;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s}
.btn-commander:hover{background:#e09510}
.btn-commander.disabled{background:#ccc;cursor:not-allowed}

.section-card{background:#fff;border:1px solid #f0e8d8;border-radius:12px;padding:1.5rem;margin-bottom:1.5rem}
.section-card h3{font-size:1rem;font-weight:700;margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:1px solid #f0e8d8}
.plat-item{padding:.75rem 0;border-bottom:1px solid #f5f0e8}
.plat-item:last-child{border-bottom:none}
.plat-type{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#f5a623;margin-bottom:.25rem}
.plat-nom{font-size:.95rem;font-weight:600;margin-bottom:.25rem}
.plat-allergenes{font-size:.78rem;color:#c62828;background:#fce4e4;padding:3px 8px;border-radius:4px;display:inline-block;margin-top:.25rem}
.plat-allergenes.none{color:#2e7d32;background:#e8f5e9}

.galerie{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem}
.galerie-item{background:linear-gradient(135deg,#f5a623,#e07510);border-radius:8px;height:100px;display:flex;align-items:center;justify-content:center;font-size:2rem}

footer{background:#1a1a1a;color:#ccc;padding:2rem;text-align:center;font-size:.85rem;margin-top:3rem}
footer a{color:#888;margin:0 .5rem}
footer a:hover{color:#f5a623}

@media(max-width:768px){
  .detail-grid{grid-template-columns:1fr}
  .galerie{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Vite <span>& Gourmand</span></a>
  <div class="nav-links">
    <a href="menus.html">Nos menus</a>
    <a href="contact.html">Contact</a>
    <a href="login.html" class="btn-login">Connexion</a>
  </div>
</nav>

<div class="container">
  <a href="menus.html" class="back">← Retour aux menus</a>
  <div id="detail-content"></div>
</div>

<footer>
  <span>© 2024 Vite & Gourmand</span>
  <a href="mentions-legales.html">Mentions légales</a>
  <a href="cgv.html">CGV</a>
</footer>

<script>
const menus = [
  {id:1,titre:"Menu Noël Prestige",description:"Un repas de fête inoubliable avec foie gras, chapon rôti et bûche maison. Idéal pour réunir famille et amis autour d'une table festive et chaleureuse.",theme:"Noël",regime:"Classique",prix:185,personnes:8,stock:5,emoji:"🎄",
    plats:[
      {type:"Entrée",nom:"Foie gras mi-cuit et ses toasts briochés",allergenes:"Gluten, Lait"},
      {type:"Plat",nom:"Chapon rôti aux marrons et sauce au foie gras",allergenes:"Aucun"},
      {type:"Dessert",nom:"Bûche de Noël maison vanille-framboise",allergenes:"Gluten, Lait, Œufs"}
    ],
    conditions:"Ce menu doit être commandé au minimum 7 jours avant la date de la prestation. Conservation au réfrigérateur entre 2°C et 4°C. Matériel de présentation fourni et à restituer sous 10 jours.",
    galerie:["🍾","🥂","🎁"]},
  {id:2,titre:"Menu Pâques Gourmand",description:"Agneau de lait, légumes printaniers et chocolats artisanaux pour célébrer Pâques avec élégance et fraîcheur saisonnière.",theme:"Pâques",regime:"Classique",prix:120,personnes:6,stock:8,emoji:"🐣",
    plats:[
      {type:"Entrée",nom:"Velouté d'asperges blanches et sa crème fouettée",allergenes:"Lait"},
      {type:"Plat",nom:"Gigot d'agneau de lait rôti aux herbes de Provence",allergenes:"Aucun"},
      {type:"Dessert",nom:"Assortiment de chocolats artisanaux maison",allergenes:"Lait, Soja"}
    ],
    conditions:"Commande à effectuer 5 jours avant la prestation. Livraison en contenants isothermes. Service conseillé dans les 2h suivant la livraison.",
    galerie:["🌸","🐰","🍫"]},
  {id:3,titre:"Menu Mariage Classique",description:"Menu raffiné pour votre grand jour : velouté, filet de bœuf Wellington et pièce montée sur mesure.",theme:"Événement",regime:"Classique",prix:320,personnes:20,stock:3,emoji:"💍",
    plats:[
      {type:"Entrée",nom:"Velouté de homard et ses croutons dorés",allergenes:"Crustacés, Gluten, Lait"},
      {type:"Plat",nom:"Filet de bœuf Wellington et sa sauce périgueux",allergenes:"Gluten, Lait"},
      {type:"Dessert",nom:"Pièce montée choux crème et caramel",allergenes:"Gluten, Lait, Œufs"}
    ],
    conditions:"Réservation obligatoire 3 semaines à l'avance. Acompte de 30% demandé à la commande. Matériel de service fourni, restitution sous 10 jours ouvrés.",
    galerie:["💐","🥂","🎂"]},
  {id:4,titre:"Menu Végétarien Printemps",description:"Risotto aux asperges, tarte aux légumes du moment et tiramisu maison. Une cuisine végétarienne gastronomique.",theme:"Classique",regime:"Végétarien",prix:95,personnes:4,stock:10,emoji:"🥗",
    plats:[
      {type:"Entrée",nom:"Gaspacho de tomates cerises et basilic frais",allergenes:"Aucun"},
      {type:"Plat",nom:"Risotto crémeux aux asperges et parmesan",allergenes:"Lait"},
      {type:"Dessert",nom:"Tiramisu maison aux fruits rouges",allergenes:"Lait, Œufs, Gluten"}
    ],
    conditions:"Commande 3 jours avant la prestation. Produits frais, consommation dans les 24h suivant la livraison.",
    galerie:["🥦","🍅","🧀"]},
  {id:5,titre:"Menu Vegan Découverte",description:"Un parcours culinaire 100% végétal : soupe froide, burger vegan gourmet et dessert au chocolat noir.",theme:"Classique",regime:"Vegan",prix:85,personnes:4,stock:12,emoji:"🌱",
    plats:[
      {type:"Entrée",nom:"Gaspacho de concombre et menthe fraîche",allergenes:"Aucun"},
      {type:"Plat",nom:"Burger vegan façon gourmet, frites maison",allergenes:"Gluten, Soja"},
      {type:"Dessert",nom:"Fondant au chocolat noir 70% et coulis de framboises",allergenes:"Gluten, Soja"}
    ],
    conditions:"Commande 3 jours avant la prestation. Tous nos produits vegan sont certifiés sans produits d'origine animale.",
    galerie:["🥑","🌿","🍫"]},
  {id:6,titre:"Menu Entreprise Premium",description:"Buffet froid et chaud pour vos événements d'entreprise. Plateaux repas personnalisés, livraison et installation incluses.",theme:"Événement",regime:"Classique",prix:65,personnes:10,stock:0,emoji:"🏢",
    plats:[
      {type:"Entrée",nom:"Plateau de charcuterie et fromages sélectionnés",allergenes:"Lait"},
      {type:"Plat",nom:"Mini-burgers, verrines et bouchées chaudes variées",allergenes:"Gluten, Lait, Œufs"},
      {type:"Dessert",nom:"Assortiment de mignardises et macarons",allergenes:"Gluten, Lait, Œufs"}
    ],
    conditions:"Commande minimum 5 jours ouvrés avant l'événement. Livraison et installation comprises. Matériel de service fourni et à restituer sous 10 jours.",
    galerie:["🥪","🍷","🎉"]}
];

const params = new URLSearchParams(window.location.search);
const id = parseInt(params.get('id'));
const menu = menus.find(m=>m.id===id) || menus[0];

document.title = menu.titre + ' – Vite & Gourmand';

document.getElementById('detail-content').innerHTML = `
  <div class="detail-grid">
    <div class="detail-img">${menu.emoji}</div>
    <div class="detail-info">
      <h1>${menu.titre}</h1>
      <div class="badges">
        <span class="badge badge-theme">${menu.theme}</span>
        <span class="badge badge-regime">${menu.regime}</span>
        <span class="badge badge-stock ${menu.stock===0?'complet':''}">${menu.stock>0?menu.stock+' place(s) restante(s)':'Complet'}</span>
      </div>
      <p class="desc">${menu.description}</p>
      <div class="price-box">
        <div class="price">${menu.prix} €</div>
        <div class="price-detail">pour ${menu.personnes} personnes minimum</div>
        <div class="reduction">🎉 −10% à partir de ${menu.personnes+5} personnes</div>
      </div>
      <div class="conditions">
        <h4>⚠️ Conditions importantes</h4>
        <p>${menu.conditions}</p>
      </div>
      <button class="btn-commander ${menu.stock===0?'disabled':''}" onclick="${menu.stock>0?`window.location.href='commande.html?id=${menu.id}'`:'void(0)'}">
        ${menu.stock>0?'Commander ce menu':'Menu indisponible'}
      </button>
    </div>
  </div>

  <div class="section-card">
    <h3>🍽️ Composition du menu</h3>
    ${menu.plats.map(p=>`
      <div class="plat-item">
        <div class="plat-type">${p.type}</div>
        <div class="plat-nom">${p.nom}</div>
        <span class="plat-allergenes ${p.allergenes==='Aucun'?'none':''}">${p.allergenes==='Aucun'?'✓ Sans allergènes majeurs':'⚠️ Allergènes : '+p.allergenes}</span>
      </div>
    `).join('')}
  </div>

  <div class="section-card">
    <h3>📸 Galerie</h3>
    <div class="galerie">
      ${menu.galerie.map(g=>`<div class="galerie-item">${g}</div>`).join('')}
    </div>
  </div>
`;
</script>
</body>
</html>
